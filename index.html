<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CRUDS Operations Pure JavaScript</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="crud">
        <div class="head">
            <h2>crud</h2>
            <p>PRODUCT MANGEMENT SYSTEM</p>
        </div>

        <div class="inputs">
            <input placeholder="title" type="text" id="title">
            <div class="price">
                <input type="number" id="price" placeholder="price" oninput="getTotal()">
                <input type="number" id="taxes" placeholder="taxes" oninput="getTotal()">
                <input type="number" id="ads" placeholder="ads" oninput="getTotal()">
                <input type="number" id="discount" placeholder="discount" oninput="getTotal()">
                <small id="total"></small>
            </div>
            <input placeholder="count" type="number" id="count">
            <input placeholder="category" type="text" id="category">
            <button id="submit">Create</button>
        </div>

        
        <div class="outputs">
            <div class="searchBlock">
                <input onkeyup="searchData(this.value)" type="text" id="search" placeholder="Search">
                <div class="btnSearch">
                    <button onclick="getSearchMood(this.id)" id="searchTitle">Search By Title</button>
                    <button  onclick="getSearchMood(this.id)"  id="searchCategory">Search By Category</button>
                </div>

            </div>

            <div id="deleteAll">

            </div>

            <table>
                <tr>
                    <th>id</th>
                    <th>title</th>
                    <th>price</th>
                    <th>taxes</th>
                    <th>ads</th>
                    <th>discount</th>
                    <th>total</th>
                    <th>category</th>
                    <th>update</th>
                    <th>delete</th>
                </tr>

                <tbody id="tbody">
                    <tr>
                        <!-- <td>1</td>
                        <td>oppo</td>
                        <td>2000</td>
                        <td>200</td>
                        <td>200</td>
                        <td>200</td>
                        <td>200</td>
                        <td>phone</td>
                        <td><button id="update">update</button></td>
                        <td><button id="delete">delete</button></td> -->

                    </tr>
                </tbody>

            </table>
        </div>

    </div>


    <script src="main.js"></script>
</body>
</html>
